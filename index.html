<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SoundBoard</title>
  <meta name="description" content="Soundboard web multi-thème, propulsé par ThemeForge." />
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
  <a class="skip-link" href="#board">Aller au tableau de sons</a>

  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">&#9836;</span>
      <div class="brand-text">
        <h1 id="pack-title">SoundBoard</h1>
        <p id="pack-subtitle" class="muted"></p>
      </div>
    </div>

    <div class="header-controls">
      <label class="select-wrap">
        <span class="select-label">Pack</span>
        <select id="pack-select" aria-label="Choisir un pack"></select>
      </label>
      <label class="select-wrap">
        <span class="select-label">Thème</span>
        <select id="theme-select" aria-label="Choisir un thème"></select>
      </label>
      <div class="volume-wrap">
        <button id="mute" class="vol-mute" type="button"
                aria-pressed="false" aria-label="Couper le son" title="Couper le son">
          <span aria-hidden="true">&#128266;</span>
        </button>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.9"
               aria-label="Volume" />
      </div>
      <button id="stop-all" class="stop-btn" type="button" title="Tout arrêter (Échap)">
        <span aria-hidden="true">&#9632;</span> Stop
      </button>
    </div>
  </header>

  <div class="toolbar">
    <div class="search-hero">
      <span class="search-icon" aria-hidden="true">&#128269;</span>
      <input id="search" type="search" placeholder="Rechercher une réplique…  (touche /)"
             autocomplete="off" aria-label="Rechercher une réplique" />
    </div>

    <div id="char-combo" class="char-combo"></div>

    <button id="fav-toggle" class="icon-btn" type="button"
            aria-pressed="false" title="Afficher seulement les favoris">
      <span class="star" aria-hidden="true">&#9733;</span>
      <span class="icon-btn-label">Favoris</span>
    </button>

    <span id="result-count" class="result-count muted" aria-live="polite"></span>
  </div>

  <main id="board" class="board"></main>

  <p id="empty-state" class="empty-state" hidden>Aucune réplique ne correspond.</p>

  <footer class="app-footer">
    <span class="muted">Thèmes : <strong>ThemeForge</strong></span>
    <span class="muted">Sons : projet communautaire Kaamelott Soundboard</span>
  </footer>

  <script src="assets/js/app.js" defer></script>
</body>
</html>
